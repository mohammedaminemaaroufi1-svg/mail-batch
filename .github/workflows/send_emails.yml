name: Send batch emails

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: send-emails
  cancel-in-progress: false  # true إذا أردت أن يلغي التشغيل الجديد القديم، أو false ليمنع تشغيلين معًا

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run send script
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: |
          python send_batch.py
