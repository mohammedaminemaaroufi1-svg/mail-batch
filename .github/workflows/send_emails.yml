name: Send batch emails hourly

on:
  schedule:
    # كل ساعة عند الدقيقة 0
    - cron: '20 * * * *'
  workflow_dispatch: {}  # للتشغيل اليدوي

permissions:
  contents: write  # للسماح بعمل commit/push لملف sent.json

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # يسمح باستخدام GITHUB_TOKEN للـ push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies (none required)
        run: |
          python -V

      - name: Run send script
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_ACTOR موجود تلقائياً ولكن يمكن تعيينه هنا أيضاً
        run: |
          chmod +x send_batch.py
          python send_batch.py
